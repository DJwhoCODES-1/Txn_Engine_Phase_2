syntax = "proto3";

package admin;

option go_package = "txn-engine-phase-2/proto/gen/go/admin;admin";

service AuthService {
  rpc LoginAdmin (LoginRequest) returns (LoginResponse);
  rpc VerifyOtp (VerifyOtpRequest) returns (VerifyOtpResponse);
  rpc RegisterAdmin (RegisterRequest) returns (RegisterResponse);
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string mobile = 3;
  string password = 4;
  string role = 5;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string id = 3;
}

message LoginRequest {
  string mobile = 1;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string otp = 3;
}

message VerifyOtpRequest {
  string mobile = 1;
  string otp = 2;
}

message VerifyOtpResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
  string refreshToken = 4;
  string id = 5;
}